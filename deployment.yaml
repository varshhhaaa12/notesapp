apiVersion: apps/v1
kind: Deployment

metadata:
  name: notes-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: notes

  template:
    metadata:
      labels:
        app: notes

    spec:
      containers:
        - name: notes-app
          image: varshakatrepally/notes-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
